<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CensorBot Demo | Marcel Giovanni Munaba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #1f242d;
            --surface: #2a303a;
            --text: #f5f7fb;
            --accent: #d7b34d;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .demo-layout {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .demo-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .demo-topbar a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .demo-shell {
            flex: 1;
            padding: 12px;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: calc(100vh - 78px);
            border: 0;
            border-radius: 12px;
            background: #111318;
        }
    </style>
</head>
<body>
    <div class="demo-layout">
        <header class="demo-topbar">
            <a href="index.html#Projects">← Back to Projects</a>
            <strong>CensorBot Demo</strong>
            <a href="https://censorbot.streamlit.app/" target="_blank" rel="noopener noreferrer">Open on Streamlit ↗</a>
        </header>
        <main class="demo-shell">
            <iframe
                title="CensorBot Demo"
                src="https://censorbot.streamlit.app/?embed=true&embed_options=dark_theme"
                loading="lazy"></iframe>
        </main>
    </div>
</body>
</html>
